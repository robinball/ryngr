<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ryngr — Sign In</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-card">
      <h1 id="auth-title">Sign Up</h1>
      <p class="subtitle" id="auth-subtitle">Create your Ryngr account</p>

      <div class="error-msg" id="error-msg"></div>

      <form id="auth-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Min 6 characters" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="auth-btn">Create Account</button>
      </form>

      <div class="toggle">
        <span id="toggle-text">Already have an account?</span>
        <a href="#" id="toggle-link">Sign in</a>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
