<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ryngr — Settings</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- Navbar -->
  <header class="navbar">
    <div class="logo">Ryng<span>r</span></div>
    <nav>
      <a href="/dashboard.html">Dashboard</a>
      <a href="/settings.html">Settings</a>
      <a href="#" id="logout-link">Log out</a>
    </nav>
  </header>

  <div class="container settings">
    <h1>Settings</h1>

    <form id="settings-form" class="settings-grid">
      <div class="card">
        <h3 style="margin-bottom:16px;">Business Info</h3>
        <div class="form-group">
          <label for="s-business-name">Business Name</label>
          <input type="text" id="s-business-name">
        </div>
        <div class="form-group">
          <label for="s-phone-number">Your Phone Number</label>
          <input type="tel" id="s-phone-number">
        </div>
      </div>

      <div class="card">
        <h3 style="margin-bottom:16px;">Messaging</h3>
        <div class="form-group">
          <label for="s-whatsapp">WhatsApp Number</label>
          <input type="tel" id="s-whatsapp">
        </div>
        <div class="form-group">
          <label for="s-booking-url">Booking URL</label>
          <input type="url" id="s-booking-url" placeholder="https://cal.com/yourname">
        </div>
        <div class="form-group">
          <label for="s-sms-template">SMS Template</label>
          <textarea id="s-sms-template" rows="4"></textarea>
        </div>
        <div class="sms-preview-label">Live Preview</div>
        <div class="sms-preview" id="s-sms-preview"></div>
      </div>

      <button type="submit" class="btn btn-primary">Save Changes</button>
    </form>

    <!-- Danger zone -->
    <div class="danger-zone">
      <h3>Subscription</h3>
      <p>Manage your billing, update your card, or cancel your subscription via Stripe.</p>
      <button type="button" class="btn btn-danger btn-sm" id="manage-billing-btn">Manage Billing</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/js/app.js"></script>
  <script src="/js/settings.js"></script>
</body>
</html>
